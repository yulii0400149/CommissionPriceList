        // 強力 CSV 解析器
        const parseCSV = (text) => {
            const rows = [];
            let currentRow = [];
            let currentVal = '';
            let inQuote = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                
                if (char === '"') {
                    if (inQuote && nextChar === '"') {
                        currentVal += '"';
                        i++; 
                    } else {
                        inQuote = !inQuote;
                    }
                } else if (char === ',' && !inQuote) {
                    currentRow.push(currentVal);
                    currentVal = '';
                } else if ((char === '\r' || char === '\n') && !inQuote) {
                    if (char === '\r' && nextChar === '\n') i++;
                    currentRow.push(currentVal);
                    if (currentRow.length > 0 && (currentRow.length > 1 || currentRow[0] !== '')) {
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    currentVal = '';
                } else {
                    currentVal += char;
                }
            }
            if (currentVal || currentRow.length > 0) {
                currentRow.push(currentVal);
                rows.push(currentRow);
            }
            return rows;
        };

        const cleanCSVValue = (val) => {
            if (!val) return '';
            return val.trim().replace(/^"|"$/g, '').replace(/""/g, '"');
        };

        const fetchDataFromCSV = async (url) => {
            const timestamp = new Date().getTime();
            const separator = url.includes('?') ? '&' : '?';
            const urlWithTimestamp = `${url}${separator}_t=${timestamp}`;
            
            const proxies = [
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(urlWithTimestamp)}`,
                `https://corsproxy.io/?${encodeURIComponent(urlWithTimestamp)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(urlWithTimestamp)}`,
                urlWithTimestamp 
            ];

            for (const proxyUrl of proxies) {
                try {
                    const response = await fetch(proxyUrl);
                    if (response.ok) {
                        let text = await response.text();
                        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
                        if (text.trim().startsWith('<!DOCTYPE html') || text.trim().startsWith('<html')) continue; 
                        return text;
                    }
                } catch (err) {
                    console.warn(`Proxy failed: ${proxyUrl}`, err);
                }
            }
            throw new Error("All proxies failed to fetch CSV data.");
        };
